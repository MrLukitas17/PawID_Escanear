<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>PawID - Ficha de Mascota</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html-docx-js/0.3.1/html-docx.js"></script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #F9F9F9; display: flex; justify-content: center; padding: 20px; }
  
  .card {
    background: #FFFFFF;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    border: 3px solid #007777;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .header { background: #007777; color: white; padding: 20px; border-radius: 12px; margin-bottom: 24px; text-align: center; }
  .section-title { color: #007777; font-weight: 800; font-size: 13px; margin: 20px 0 12px 0; border-bottom: 2px solid #007777; padding-bottom: 5px; text-transform: uppercase; }
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0F0F0; font-size: 14px; }
  
  .btn-container { display: flex; gap: 10px; margin-top: 25px; }
  .btn { flex: 1; border: none; border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; color: white; }
  .btn-pdf { background: #E63946; }
  .btn-word { background: #2A9D8F; }
</style>
</head>
<body>

<div id="content"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pet = {
    nombre: params.get('n') || 'N/A',
    especie: params.get('e') || 'N/A',
    raza: params.get('r') || 'N/A',
    nacimiento: params.get('f') || 'N/A',
    edad: params.get('ed') || 'N/A',
    dueno: params.get('d') || 'N/A',
    telefono: params.get('t') || 'N/A',
  };

  const cardHtml = `
    <div class="card" id="card-to-export">
      <div class="header"><h2>PawID</h2><p>Ficha de Mascota</p></div>
      <div class="section-title">DATOS DE LA MASCOTA</div>
      <div class="row"><span>Nombre:</span><b>${pet.nombre}</b></div>
      <div class="row"><span>Especie:</span><b>${pet.especie}</b></div>
      <div class="row"><span>Raza:</span><b>${pet.raza}</b></div>
      <div class="row"><span>Nacimiento:</span><b>${pet.nacimiento}</b></div>
      <div class="row"><span>Edad:</span><b>${pet.edad}</b></div>
      <div class="section-title">DATOS DEL DUEÑO</div>
      <div class="row"><span>Nombre:</span><b>${pet.dueno}</b></div>
      <div class="row"><span>Teléfono:</span><b>${pet.telefono}</b></div>
    </div>
    <div class="btn-container">
      <button class="btn btn-pdf" onclick="descargarPDF()">📥 PDF</button>
      <button class="btn btn-word" onclick="descargarWord()">📝 Word</button>
    </div>`;

  document.getElementById('content').innerHTML = cardHtml;

  function descargarPDF() {
    const element = document.getElementById('card-to-export');
    html2pdf().from(element).save('Ficha_' + pet.nombre + '.pdf');
  }

  function descargarWord() {
    const content = document.getElementById('card-to-export').innerHTML;
    const converted = htmlDocx.asBlob(content);
    saveAs(converted, 'Ficha_' + pet.nombre + '.docx');
  }
</script>
</body>
</html>
