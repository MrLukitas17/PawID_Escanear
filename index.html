<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawID - Ficha de Mascota</title>
    <style>
        /* Diseño idéntico al de tu PDF */
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; display: flex; justify-content: center; }
        .card { 
            background: white; width: 100%; max-width: 450px; padding: 25px; 
            border-radius: 12px; border: 2px solid #008080; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .header { background: #008080; color: white; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .row b { color: #333; }
        .btn { 
            width: 100%; background: #008080; color: white; padding: 15px; 
            border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; 
        }
    </style>
</head>
<body>

<div id="content" class="card">
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const pet = {
        nombre: params.get('n') || '---',
        especie: params.get('e') || '---',
        raza: params.get('r') || '---',
        dueno: params.get('d') || '---',
        telefono: params.get('t') || '---'
    };

    document.getElementById('content').innerHTML = `
        <div class="header"><h2>PawID</h2><p>Ficha de Mascota</p></div>
        <div class="row"><span>Nombre:</span><b>${pet.nombre}</b></div>
        <div class="row"><span>Especie:</span><b>${pet.especie}</b></div>
        <div class="row"><span>Raza:</span><b>${pet.raza}</b></div>
        <div class="row"><span>Dueño:</span><b>${pet.dueno}</b></div>
        <div class="row"><span>Teléfono:</span><b>${pet.telefono}</b></div>
        <button class="btn" onclick="window.print()">🖨️ Descargar / Imprimir Ficha</button>
    `;
</script>
</body>
</html>
