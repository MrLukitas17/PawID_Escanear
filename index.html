<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawID - Ficha de Mascota</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background: #F9F9F9; 
    display: flex; 
    justify-content: center; 
    align-items: flex-start; 
    min-height: 100vh; 
    padding: 20px; 
  }
  
  .card {
    background: #FFFFFF;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    /* Borde verde solicitado */
    border: 3px solid #007777; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  }

  .header { 
    background: #007777; 
    color: white; 
    padding: 20px; 
    border-radius: 12px; 
    margin-bottom: 24px; 
    text-align: center; 
  }
  
  .header h2 { font-size: 24px; margin-bottom: 5px; }
  .header p { font-size: 14px; opacity: 0.9; }
  
  .section-title { 
    color: #007777; 
    font-weight: 800; 
    font-size: 13px;
    margin-bottom: 12px; 
    margin-top: 20px;
    border-bottom: 2px solid #007777; 
    padding-bottom: 5px; 
    text-transform: uppercase;
  }
  
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #F0F0F0; font-size: 14px; }
  .row span { color: #666; }
  .row b { color: #333; }
  
  .btn {
    width: 100%;
    background: #007777; 
    color: white;
    border: none; 
    border-radius: 10px;
    padding: 14px; 
    font-weight: bold; 
    cursor: pointer; 
    margin-top: 25px;
    font-size: 16px;
    transition: background 0.3s;
  }
  .btn:hover { background: #005a5a; }

  /* Estilos para impresión */
  @media print {
    body { background: white; padding: 0; }
    .btn { display: none; }
    .card { box-shadow: none; border: 3px solid #007777; }
  }
</style>
</head>
<body>

<div id="content"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pet = {
    nombre: params.get('n') || 'N/A',
    especie: params.get('e') || 'N/A',
    raza: params.get('r') || 'N/A',
    nacimiento: params.get('f') || 'N/A',
    edad: params.get('ed') || 'N/A',
    dueno: params.get('d') || 'N/A',
    telefono: params.get('t') || 'N/A',
  };

  const content = document.getElementById('content');

  content.innerHTML = `
    <div class="card">
      <div class="header">
        <h2>PawID</h2>
        <p>Ficha de Mascota</p>
      </div>
      
      <div class="section-title">Datos de la Mascota</div>
      <div class="row"><span>Nombre:</span><b>${pet.nombre}</b></div>
      <div class="row"><span>Especie:</span><b>${pet.especie}</b></div>
      <div class="row"><span>Raza:</span><b>${pet.raza}</b></div>
      <div class="row"><span>Nacimiento:</span><b>${pet.nacimiento}</b></div>
      <div class="row"><span>Edad:</span><b>${pet.edad}</b></div>
      
      <div class="section-title">Datos del Dueño</div>
      <div class="row"><span>Nombre:</span><b>${pet.dueno}</b></div>
      <div class="row"><span>Teléfono:</span><b>${pet.telefono}</b></div>
      
      <button class="btn" onclick="window.print()">📥 Descargar PDF</button>
    </div>`;
</script>
</body>
</html>
