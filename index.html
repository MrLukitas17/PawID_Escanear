<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawID - Ficha de Mascota</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF; /* Fondo blanco limpio */
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .card {
    background: #FFFFFF;
    border-radius: 18px;
    padding: 28px 24px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    margin-bottom: 16px;
  }
  .header {
    background: #007777;
    border-radius: 12px;
    padding: 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .avatar {
    width: 60px; height: 60px;
    background: #FFFFFF;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: bold; color: #007777;
  }
  .header-text h1 { color: #FFFFFF; font-size: 22px; font-weight: 700; }
  .header-text p { color: #E0F2F1; font-size: 13px; margin-top: 3px; }
  .section-title {
    font-size: 12px; font-weight: 700;
    color: #007777; margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .row {
    display: flex; justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid #F0F0F0;
    font-size: 14px;
  }
  .label { color: #666; }
  .value { color: #333; font-weight: 600; }
  .btn {
    display: block; width: 100%;
    background: #007777; color: white;
    border: none; border-radius: 10px;
    padding: 16px; font-size: 16px;
    font-weight: 700; cursor: pointer;
    text-align: center; margin-top: 20px;
  }
  .footer {
    color: #AAA; font-size: 11px;
    text-align: center; margin-top: 20px;
  }
</style>
</head>
<body>

<div id="content"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pet = {
    nombre: params.get('n') || '',
    especie: params.get('e') || '',
    raza: params.get('r') || '',
    nacimiento: params.get('f') || '',
    edad: params.get('ed') || '',
    dueno: params.get('d') || '',
    telefono: params.get('t') || '',
  };

  const content = document.getElementById('content');
  const inicial = pet.nombre ? pet.nombre.charAt(0).toUpperCase() : '?';

  if (!pet.nombre) {
    content.innerHTML = `<div class="card"><p>No se encontraron datos.</p></div>`;
  } else {
    content.innerHTML = `
      <div class="card">
        <div class="header">
          <div class="avatar">${inicial}</div>
          <div class="header-text">
            <h1>${pet.nombre}</h1>
            <p>${pet.especie} · ${pet.raza}</p>
          </div>
        </div>
        <div class="section-title">Datos de la Mascota</div>
        <div class="row"><span class="label">Nombre</span><span class="value">${pet.nombre}</span></div>
        <div class="row"><span class="label">Especie</span><span class="value">${pet.especie}</span></div>
        <div class="row"><span class="label">Raza</span><span class="value">${pet.raza}</span></div>
        <div class="row"><span class="label">Nacimiento</span><span class="value">${pet.nacimiento}</span></div>
        <div class="row"><span class="label">Edad</span><span class="value">${pet.edad}</span></div>
        <br>
        <div class="section-title">Datos del Dueño</div>
        <div class="row"><span class="label">Nombre</span><span class="value">${pet.dueno}</span></div>
        <div class="row"><span class="label">Teléfono</span><span class="value">${pet.telefono}</span></div>
        <button class="btn" onclick="window.print()">Descargar PDF</button>
        <p class="footer">Generado por PawID</p>
      </div>`;
  }
</script>
</body>
</html>
