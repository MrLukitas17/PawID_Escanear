<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>PawID - Ficha de Mascota</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #visor-container { 
            width: 100%; max-width: 600px; height: 700px; 
            background: white; border: 2px solid #008080; border-radius: 10px;
            overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h2>Visualización de Ficha</h2>
    <div id="visor-container">
        <iframe id="pdf-viewer"></iframe>
    </div>

<script>
    const params = new URLSearchParams(window.location.search);
    const pet = {
        nombre: params.get('n') || '---',
        especie: params.get('e') || '---',
        raza: params.get('r') || '---',
        dueno: params.get('d') || '---',
        telefono: params.get('t') || '---'
    };

    // Generar el PDF al cargar la página
    window.onload = function() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Diseño del PDF (Aquí puedes personalizar los textos como en tu App)
        doc.setFontSize(20); doc.text("Ficha de Mascota - PawID", 20, 20);
        doc.setFontSize(12);
        doc.text(`Nombre: ${pet.nombre}`, 20, 40);
        doc.text(`Especie: ${pet.especie}`, 20, 50);
        doc.text(`Raza: ${pet.raza}`, 20, 60);
        doc.text(`Dueño: ${pet.dueno}`, 20, 70);
        doc.text(`Teléfono: ${pet.telefono}`, 20, 80);
        
        // Convertimos el PDF a una URL de datos y la cargamos en el iframe
        const pdfUrl = doc.output('bloburl');
        document.getElementById('pdf-viewer').src = pdfUrl;
    };
</script>
</body>
</html>
