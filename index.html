<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawID - Ficha de Mascota</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #F5F5F0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        .top-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .top-logo span { font-size: 22px; font-weight: 700; color: #007777; }
        .main-card {
            background: #FEFEFE;
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            border: 2.5px solid #00A3A3;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,119,119,0.12);
        }
        .header {
            background-color: #007777;
            padding: 20px;
            color: #FEFEFE;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h2 { font-size: 22px; font-weight: 700; }
        .header small { color: #E0F7FA; font-size: 13px; }
        .pet-img {
            width: 64px; height: 64px;
            border-radius: 50%;
            border: 2.5px solid white;
            object-fit: cover;
        }
        .pet-initial {
            width: 64px; height: 64px;
            background: #E0F7FA;
            border-radius: 50%;
            border: 2px solid white;
            color: #007777;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            font-weight: 700;
        }
        .section-title {
            background-color: #00A3A3;
            color: white;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 14px;
        }
        .section-content {
            background-color: #F5F5F0;
            padding: 14px 16px;
            border-bottom: 1px solid #E0F7FA;
        }
        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .row:last-child { margin-bottom: 0; }
        .label { color: #666; }
        .value { color: #1A1A3A; font-weight: 700; }
        .card-footer {
            background: #E0F7FA;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #007777;
        }
        .btn-group {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 26px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-view { background: #007777; color: white; }
        .btn-download { background: #00A3A3; color: white; }

        /* ---- MODAL para "Ver ficha en PDF" ---- */
        .pdf-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.55);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .pdf-modal-overlay.active {
            display: flex;
        }
        .pdf-modal-box {
            background: #fff;
            width: 95%;
            max-width: 560px;
            height: 90vh;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .pdf-modal-header {
            background: #007777;
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
        }
        .pdf-modal-close {
            background: none;
            border: none;
            color: white;
            font-size: 22px;
            cursor: pointer;
            line-height: 1;
        }
        .pdf-modal-iframe {
            flex: 1;
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div class="top-logo"><span>🐾 PawID</span></div>
    <div class="main-card" id="content"></div>
    <div class="btn-group">
        <button class="btn btn-view" onclick="verPDF()">👁️ VER FICHA EN PDF</button>
        <button class="btn btn-download" onclick="descargarPDF()">⬇️ DESCARGAR PDF</button>
    </div>

    <!-- Modal que muestra el PDF embebido, sin disparar descarga -->
    <div class="pdf-modal-overlay" id="pdfModal">
        <div class="pdf-modal-box">
            <div class="pdf-modal-header">
                <span>Ficha de Mascota</span>
                <button class="pdf-modal-close" onclick="cerrarModalPDF()">&times;</button>
            </div>
            <iframe class="pdf-modal-iframe" id="pdfFrame"></iframe>
        </div>
    </div>

<script>
    // Limpia valores: si viene vacío, null, "undefined" o solo espacios, usa el fallback
    function limpiar(valor, fallback) {
        if (valor === null || valor === undefined) return fallback;
        const v = String(valor).trim();
        if (v === '' || v === 'null' || v === 'undefined') return fallback;
        return v;
    }

    const params = new URLSearchParams(window.location.search);
    const pet = {
        n:   limpiar(params.get('n'),  '---'),
        e:   limpiar(params.get('e'),  '---'),
        r:   limpiar(params.get('r'),  '---'),
        f:   limpiar(params.get('f'),  '---'),
        ed:  limpiar(params.get('ed'), 'N/A'),
        d:   limpiar(params.get('d'),  '---'),
        t:   limpiar(params.get('t'),  '---'),
        id:  limpiar(params.get('id'), '---'),
        img: params.get('img') || null
    };

    const headerRight = pet.img
        ? `<img src="${pet.img}" class="pet-img" onerror="this.outerHTML='<div class=pet-initial>${pet.n[0].toUpperCase()}</div>'">`
        : `<div class="pet-initial">${pet.n[0].toUpperCase()}</div>`;

    document.getElementById('content').innerHTML = `
        <div class="header">
            <div><h2>PawID</h2><small>Ficha de Mascota</small></div>
            ${headerRight}
        </div>
        <div class="section-title">Datos de la Mascota</div>
        <div class="section-content">
            <div class="row"><span class="label">Nombre</span><span class="value">${pet.n}</span></div>
            <div class="row"><span class="label">Especie</span><span class="value">${pet.e}</span></div>
            <div class="row"><span class="label">Raza</span><span class="value">${pet.r}</span></div>
            <div class="row"><span class="label">Fecha de nacimiento</span><span class="value">${pet.f}</span></div>
            <div class="row"><span class="label">Edad</span><span class="value">${pet.ed}</span></div>
        </div>
        <div class="section-title">Datos del Dueño</div>
        <div class="section-content">
            <div class="row"><span class="label">Nombre</span><span class="value">${pet.d}</span></div>
            <div class="row"><span class="label">Teléfono</span><span class="value">${pet.t}</span></div>
        </div>
        <div class="card-footer">
            <span>ID: ${pet.id}</span>
            <span>Generado por PawID</span>
        </div>
    `;

    function generarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        const w = 210;

        doc.setFillColor(0, 119, 119);
        doc.roundedRect(15, 15, w - 30, 30, 4, 4, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(18);
        doc.setFont('helvetica', 'bold');
        doc.text('PawID', 25, 28);
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.text('Ficha de Mascota', 25, 35);
        doc.setFillColor(224, 247, 250);
        doc.circle(w - 30, 30, 12, 'F');
        doc.setTextColor(0, 119, 119);
        doc.setFontSize(14);
        doc.setFont('helvetica', 'bold');
        doc.text(pet.n[0].toUpperCase(), w - 33, 34);

        doc.setFillColor(0, 163, 163);
        doc.roundedRect(15, 52, w - 30, 8, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(11);
        doc.text('Datos de la Mascota', 20, 58);
        doc.setFillColor(245, 245, 240);
        doc.rect(15, 60, w - 30, 45, 'F');

        const mascotaData = [
            ['Nombre', pet.n],
            ['Especie', pet.e],
            ['Raza', pet.r],
            ['Fecha de nacimiento', pet.f],
            ['Edad', pet.ed],
        ];
        mascotaData.forEach(([label, value], i) => {
            const y = 69 + i * 8;
            doc.setTextColor(102, 102, 102);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.text(label, 20, y);
            doc.setTextColor(26, 26, 58);
            doc.setFont('helvetica', 'bold');
            // Fuerza string seguro: evita el glifo raro cuando el valor viene vacío/null
            doc.text(String(value || '---'), 100, y);
        });

        doc.setFillColor(0, 163, 163);
        doc.roundedRect(15, 110, w - 30, 8, 2, 2, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(11);
        doc.text('Datos del Dueño', 20, 116);
        doc.setFillColor(245, 245, 240);
        doc.rect(15, 118, w - 30, 22, 'F');

        const duenoData = [['Nombre', pet.d], ['Teléfono', pet.t]];
        duenoData.forEach(([label, value], i) => {
            const y = 127 + i * 8;
            doc.setTextColor(102, 102, 102);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(10);
            doc.text(label, 20, y);
            doc.setTextColor(26, 26, 58);
            doc.setFont('helvetica', 'bold');
            doc.text(String(value || '---'), 100, y);
        });

        doc.setFillColor(224, 247, 250);
        doc.rect(15, 145, w - 30, 10, 'F');
        doc.setTextColor(0, 119, 119);
        doc.setFont('helvetica', 'normal');
        doc.setFontSize(9);
        doc.text(`ID: ${pet.id}`, 20, 152);
        doc.text('Generado por PawID', w - 55, 152);

        return doc;
    }

    let pdfBlobUrl = null;

    // Ver PDF: lo muestra DENTRO de un modal embebido (iframe), nunca descarga
    function verPDF() {
        const doc = generarPDF();
        const blob = doc.output('blob');

        // Libera la URL anterior si existía, para no acumular memoria
        if (pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl);
        pdfBlobUrl = URL.createObjectURL(blob);

        document.getElementById('pdfFrame').src = pdfBlobUrl;
        document.getElementById('pdfModal').classList.add('active');
    }

    function cerrarModalPDF() {
        document.getElementById('pdfModal').classList.remove('active');
        document.getElementById('pdfFrame').src = '';
    }

    // Cierra el modal si se toca fuera del recuadro
    document.getElementById('pdfModal').addEventListener('click', function(e) {
        if (e.target === this) cerrarModalPDF();
    });

    // Descargar PDF directamente
    function descargarPDF() {
        const doc = generarPDF();
        doc.save(`PawID_${pet.n}.pdf`);
    }
</script>
</body>
</html>
