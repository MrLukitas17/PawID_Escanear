<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawID - Ficha de Mascota</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: sans-serif; background: #FFFFFF; display: flex; justify-content: center; padding: 20px; }
  
  .card {
    background: #FFFFFF;
    border-radius: 20px;
    padding: 24px;
    width: 100%;
    max-width: 400px;
    border: 2px solid #007777; /* Borde verde solicitado */
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .header { background: #007777; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
  
  .section-title { color: #007777; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #007777; padding-bottom: 5px; }
  
  .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
  
  .btn {
    width: 100%;
    background: #007777; color: white;
    border: none; border-radius: 8px;
    padding: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;
  }
</style>
</head>
<body>

<div id="content"></div>

<script>
  const params = new URLSearchParams(window.location.search);
  const pet = {
    nombre: params.get('n') || 'N/A',
    especie: params.get('e') || 'N/A',
    raza: params.get('r') || 'N/A',
    nacimiento: params.get('f') || 'N/A',
    edad: params.get('ed') || 'N/A',
    dueno: params.get('d') || 'N/A',
    telefono: params.get('t') || 'N/A',
  };

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="header"><h2>PawID</h2><p>Ficha de Mascota</p></div>
      
      <div class="section-title">DATOS DE LA MASCOTA</div>
      <div class="row"><span>Nombre:</span><b>${pet.nombre}</b></div>
      <div class="row"><span>Especie:</span><b>${pet.especie}</b></div>
      <div class="row"><span>Raza:</span><b>${pet.raza}</b></div>
      <div class="row"><span>Nacimiento:</span><b>${pet.nacimiento}</b></div>
      <div class="row"><span>Edad:</span><b>${pet.edad}</b></div>
      
      <br>
      <div class="section-title">DATOS DEL DUEÑO</div>
      <div class="row"><span>Nombre:</span><b>${pet.dueno}</b></div>
      <div class="row"><span>Teléfono:</span><b>${pet.telefono}</b></div>
      
      <button class="btn" onclick="window.print()">📥 Descargar PDF</button>
    </div>`;
</script>
</body>
</html>
