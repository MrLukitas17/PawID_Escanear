<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawID - Ficha de Mascota</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: #f4f4f4; display: flex; justify-content: center; padding: 20px; }
        
        /* Diseño que coincide con tu imagen de referencia */
        .card {
            background: #ffffff;
            border-radius: 15px;
            padding: 30px;
            width: 100%;
            max-width: 450px;
            border: 2px solid #008080; /* Borde verde */
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header { background: #008080; color: white; padding: 20px; border-radius: 10px; margin-bottom: 25px; }
        .section-title { color: #008080; font-weight: bold; margin-bottom: 10px; border-bottom: 2px solid #008080; padding-bottom: 5px; }
        .row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e0e0e0; }
        
        .btn {
            width: 100%; background: #008080; color: white; border: none; 
            border-radius: 8px; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="content"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const pet = {
        nombre: params.get('n') || '---',
        especie: params.get('e') || '---',
        raza: params.get('r') || '---',
        nacimiento: params.get('f') || '---',
        edad: params.get('ed') || '---',
        dueno: params.get('d') || '---',
        telefono: params.get('t') || '---',
        id: params.get('id') || '---'
    };

    // Renderizado del documento igual al que se ve en la App
    document.getElementById('content').innerHTML = `
        <div class="card">
            <div class="header"><h2>PawID</h2><p>Ficha de Mascota</p></div>
            <div class="section-title">DATOS DE LA MASCOTA</div>
            <div class="row"><span>Nombre:</span><b>${pet.nombre}</b></div>
            <div class="row"><span>Especie:</span><b>${pet.especie}</b></div>
            <div class="row"><span>Raza:</span><b>${pet.raza}</b></div>
            <div class="row"><span>Nacimiento:</span><b>${pet.nacimiento}</b></div>
            <div class="row"><span>Edad:</span><b>${pet.edad}</b></div>
            <div class="section-title" style="margin-top:20px;">DATOS DEL DUEÑO</div>
            <div class="row"><span>Nombre:</span><b>${pet.dueno}</b></div>
            <div class="row"><span>Teléfono:</span><b>${pet.telefono}</b></div>
            <button class="btn" onclick="abrirPrevisualizacion()">👁️ Ver y Descargar Ficha</button>
        </div>`;

    function abrirPrevisualizacion() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Estructura del PDF (Diseño verde)
        doc.setFillColor(0, 128, 128); // Color verde
        doc.rect(10, 10, 190, 20, 'F');
        doc.setTextColor(255, 255, 255);
        doc.text("PawID - Ficha de Mascota", 15, 22);
        
        doc.setTextColor(0, 0, 0);
        doc.text(`Nombre: ${pet.nombre}`, 20, 50);
        doc.text(`Especie: ${pet.especie}`, 20, 60);
        doc.text(`Raza: ${pet.raza}`, 20, 70);
        
        // --- AQUÍ ESTÁ EL TRUCO PARA VERLO ---
        const blob = doc.output('bloburl');
        window.open(blob, '_blank'); // Abre el visor de PDF del navegador
    }
</script>
</body>
</html>
